[environment]
; Path to the Python interpreter for kardenwort (spacy-env venv)
kardenwort_python = ../20250825231214-spacy-env/Scripts/python.exe

; Path to the Kardenwort project workspace (containing data directories and scripts)
kardenwort_workspace = ../20241223170748-kardenwort

; Path to the python interpreter and translation scripts for deep-translator
deep_translator_python = ../20241122093311-deep-translator/venv/Scripts/python.exe
translate_google_script = ../20241122093311-deep-translator/translate_google.py
translate_deepl_script = ../20241122093311-deep-translator/translate_deepl.py

; Path to the settings file containing DeepL API keys and salt
deepl_settings_file = ../20240411110510-autohotkey/translate-selection/settings.ini

; Path to the IntelliFiller headless entrypoint script
intellifiller_headless = ../20251206123938-intellifiller-ai-addon-for-anki/IntelliFiller/headless_entrypoint.py

[pipeline]
; Set to true to use the local offline translation database fork/cache if available
use_local_fork = true


[pipeline]
; The base translation provider (google, deepl)
base_provider = google

; The enrichment provider (intellifiller, none)
enrichment_provider = intellifiller

[triggers]
; Trigger for base translation. Options: auto (on load), manual (user must trigger)
run_base_translation = auto

; Trigger for enrichment. Options: auto (on load), manual (user must trigger)
run_enrichment = manual

[rendering]
; UI rendering mode. Options: progressive (stream stages as ready), monolithic (wait for all stages)
display_mode = progressive

[settings]
; Default zoom percentage for the UI
default_zoom = 100

; Batch size for background reprocessing
intellifiller_batch_size = 5

; [DEPRECATED] Use [rendering] display_mode instead.
; Enable progressive loading to load translation and IntelliFiller data in the background
progressive_loading = true

; [DEPRECATED] Use [triggers] instead.
; Enable lazy processing to bypass automatic translation. Requires manual Re-process selection.
; Options: all (or true), llm_only (run Google/DeepL, skip IntelliFiller), none (or false)
lazy_processing = llm_only

; The default source language if not specified (e.g. en, de)
default_language = en

; The default target translation language (e.g. ru, uk)
default_target_language = ru

; The directory where favorites TSV files are exported (relative to config.ini location)
favorites_output_dir = ./favorites

; Whether to create a persistent file in the favorites directory when sending to Anki
save_to_favorites_on_export = true

; Whether to also copy the corresponding source .txt files to the favorites directory when exporting
copy_source_txt_to_favorites_on_export = true

; Which rows to send to Anki. Options: selected, all, unselected
export_selection_mode = selected

; Display the console window during Anki import (default is false)
show_import_window = false

; Prefix prepended to exported favorites files. Leave blank for no prefix.
favorites_prefix = 

; The configuration file mapping internal data sources to Anki note type fields
anki_mapping_file = ./anki-mapping.ini

; Save original source text next to generated TSV results (saved as [ZID]-[slug].[lang].txt)
save_source_text = true

; Save translated sentence destination text next to TSV results (saved as [ZID]-[slug].[target_lang].txt)
save_translation_text = true

; Merge and delete source text files after a successful run (used in batch processing)
merge_delete_sources = false

; Set to true to automatically trigger the Anki import process after exporting favorites
send_to_anki_after_export = true

; Run the importer in detached mode (background process) when exporting
detach_import_on_send = false

[languages]
; Paths (relative to kardenwort_workspace) and prompts for supported languages
en_lemma_index = data/en/en-news-2023-1m-words.csv
en_lemma_override = data/en/lemma_override_en.tsv
en_prompt = English Vocabulary Analysis and Translation (JSON)

de_lemma_index = data/de/deu-mixed-typical-2011-1m-words.csv
de_lemma_override = data/de/lemma_override_de.tsv
de_prompt = German Vocabulary Analysis and Translation (JSON)

[timeouts]
; Timeout values in seconds for subprocess calls
kardenwort_timeout = 120
translation_timeout = 60
intellifiller_timeout = 120

[goldendict]
; The default format for the lookup output: html, text, or combined
default_format = html

; The default target language for translations
; Falls back to [settings].default_target_language if not specified
target_language = 

; Synchronously run IntelliFiller during lookup to fetch IPA and morphology
; Note: This adds latency to the lookup command
run_intellifiller = false

; Cache TTL in seconds for extraction and translation results
lookup_ttl_seconds = 300

; The UI theme for the HTML output (dark, light, compact)
theme = compact

; Whether to emit the hidden meta comment at the start of HTML output
emit_meta_comment = true

; Disable CSS styles in HTML output
disable_css = false

; Comma-separated list of sections to render. Tokens: source, translation, lemmas
sections = source,translation,lemmas

; Heading text for each section (empty means no heading; __default__ uses built-in text)
heading_source = 
heading_translation = 
heading_lemmas = 

; Comma-separated list of columns for the lemmas table
; Valid tokens: inflected, lemma, ipa, morphology, translation
lemma_columns = inflected,lemma,translation
