[environment]
; Path to the Python interpreter for kardenwort (spacy-env venv)
kardenwort_python = ../20250825231214-spacy-env/Scripts/python.exe

; Path to the Kardenwort project workspace (containing data directories and scripts)
kardenwort_workspace = ../20241223170748-kardenwort

; Path to the python interpreter and translation scripts for deep-translator
deep_translator_python = ../20241122093311-deep-translator/venv/Scripts/python.exe
translate_google_script = ../20241122093311-deep-translator/translate_google.py
translate_deepl_script = ../20241122093311-deep-translator/translate_deepl.py
argotranslate_python = ../20241121100211-argotranslate/venv/Scripts/python.exe
argotranslate_script = ../20241121100211-argotranslate/venv/Scripts/argos-translate

; Path to the settings file containing DeepL API keys and salt
deepl_settings_file = ../20240411110510-autohotkey/translate-selection/settings.ini

; Path to the IntelliFiller headless entrypoint script
intellifiller_headless = ../20251206123938-intellifiller-ai-addon-for-anki/IntelliFiller/headless_entrypoint.py

; Path to the anki-tts-cli script
anki_tts_cli = ../20260119103526-anki-tts-cli/anki-tts-cli.py

[pipeline]
; Set to true to use the local offline translation database fork/cache if available
use_local_fork = true

; Automatically fallback to offline argos translation when primary network providers fail
auto_offline_fallback = true

; The IP addresses to ping for the fast connectivity check before online translation (comma separated, e.g. 8.8.8.8, 1.1.1.1). Leave empty to disable.
fast_connectivity_check_ips = 8.8.8.8, 1.1.1.1

; The provider for initial text translation (google, deepl, argos)
text_base_provider = deepl

; The provider for text reprocessing via Re-text (deepl, google, argos)
text_reprocess_provider = google

; The provider for initial lemma translation (google, deepl, argos, intellifiller)
lemma_base_provider = google

; The provider for lemma reprocessing via Re-word (intellifiller, none)
lemma_reprocess_provider = intellifiller

; Whether to run the lemmatizer to automatically resolve/update the lemma (WordSource) field during reprocess
run_lemmatizer = false

[triggers]
; Trigger for text sentence translation. Options: auto (on load), manual (user must trigger)
run_text_translation = auto

; Trigger for lemma base translation. Options: auto (on load), manual (user must trigger)
run_lemma_base_translation = auto

; Trigger for lemma reprocessing/enrichment. Options: auto (on load), manual (user must trigger)
run_lemma_enrichment = manual

[rendering]
; UI rendering mode. Options: progressive (stream stages as ready), monolithic (wait for all stages)
display_mode = progressive

; Whether the UI should automatically inject background updates (true) or show the Update button for manual reload (false, aka "lazy" mode)
auto_inject_updates = true

[settings]
; Default zoom percentage for the UI
default_zoom = 100

; Maximum source-word index distance allowed between parts of a split/separable verb construct
; split_gap_limit = 60

; Batch size for background reprocessing
intellifiller_batch_size = 120

; If true, empty lines in the source text are automatically removed before processing in multi mode
multi_mode_remove_empty_lines = true

; If true, excessive whitespace and tabs are collapsed into a single space in multi mode
multi_mode_clean_spaces = true

; Define when sentence context padding is applied ('single', 'multi', 'both')
anki_context_mode = single

; Number of logical words to prepend/append before/after the sentence in SentenceSource as context margin
; Note: Setting values > 0 in single mode requires two translation API requests (one for the padded flashcards, 
; one for the clean Translate View paragraph), which may slightly increase API consumption/costs for your provider.
anki_context_words_before = 5
anki_context_words_after = 5

; Maximum word count allowed for context sentences (default 40, set 0 to disable truncation)
anki_context_max_words = 40

; Configurable sentence terminator characters
anki_sentence_terminators = .!?:

; Space-separated list of abbreviation tokens (case-insensitive) to ignore as sentence terminators
anki_abbrev_list = ca. z.B. usw. uzw. bzw. etc. t.con d.h. u.a. vgl. ggf. bspw. u.u. i.d.R. bzgl. evtl. sog. bsp. z.Zt. m.E. e.g. i.e. approx. vs. cf. Ltd. Co. Inc. Prof. Dr. Mr. Mrs. Ms.

; The default source language if not specified (e.g. en, de)
default_language = en

; The default target translation language (e.g. ru, uk)
default_target_language = ru

; The directory where favorites TSV files are exported (relative to config.ini location)
favorites_output_dir = ./favorites

; Whether to create a persistent file in the favorites directory when sending to Anki
save_to_favorites_on_export = true

; Whether to also copy the corresponding source .txt files to the favorites directory when exporting
copy_source_txt_to_favorites_on_export = true

; Which rows to send to Anki. Options: selected, all, unselected
export_selection_mode = selected

; Display the console window during Anki import (default is false)
; Note: If detach_import_on_send = true, this setting is ignored and treated as false.
show_import_window = false

; Run the importer in detached mode (background process) when exporting
detach_import_on_send = true

; Prefix prepended to exported favorites files. Leave blank for no prefix.
favorites_prefix = 

; The configuration file mapping internal data sources to Anki note type fields
anki_mapping_file = ./anki-mapping.ini

; Save original source text next to generated TSV results (saved as [ZID]-[slug].[lang].txt)
save_source_text = true

; Save translated sentence destination text next to TSV results (saved as [ZID]-[slug].[target_lang].txt)
save_translation_text = true

; Merge and delete source text files after a successful run (used in batch processing)
merge_delete_sources = false

; If true, deduplicate rows by unique (inflected, lemma) pair keeping the one with most fields filled (IPA, Morphology) during merge
; merge_deduplicate = true

; If true, sort the merged TSV rows by frequency from Kardenwort Core frequency list
; merge_sort_frequency = true

; Set to true to automatically trigger the Anki import process after exporting favorites
send_to_anki_after_export = true

[languages]
; Paths (relative to kardenwort_workspace) and prompts for supported languages
en_lemma_index = data/en/en-news-2023-1m-words.csv
en_lemma_override = data/en/lemma_override_en.tsv
en_prompt = English Vocabulary Analysis and Translation (JSON)

de_lemma_index = data/de/deu-mixed-typical-2011-1m-words.csv
de_lemma_override = data/de/lemma_override_de.tsv
de_prompt = German Vocabulary Analysis and Translation (JSON)

[timeouts]
; Timeout values in seconds for subprocess calls
kardenwort_timeout = 120
translation_timeout = 60
intellifiller_timeout = 120

[goldendict]
; The default format for the lookup output: html, text, or combined
default_format = html

; The default target language for translations
; Falls back to [settings].default_target_language if not specified
target_language = 

; Synchronously run IntelliFiller during lookup to fetch IPA and morphology
; Note: This adds latency to the lookup command
run_intellifiller = false

; Cache TTL in seconds for extraction and translation results
lookup_ttl_seconds = 300

; The UI theme for the HTML output (dark, light, compact)
theme = compact

; Whether to emit the hidden meta comment at the start of HTML output
emit_meta_comment = true

; Disable CSS styles in HTML output
disable_css = false

; Comma-separated list of sections to render. Tokens: source, translation, lemmas
sections = source,translation,lemmas

; Heading text for each section (empty means no heading; __default__ uses built-in text)
heading_source = 
heading_translation = 
heading_lemmas = 

; Comma-separated list of columns for the lemmas table
; Valid tokens: inflected, lemma, ipa, morphology, translation
lemma_columns = inflected,lemma,translation

[translation]
; The split mode for translation. Options: newline_join (default), line_by_line, marker, proportional
translation_split_mode = newline_join

; The size of chunks for translation in lines. 0 means adaptive mode (default)
translation_chunk_size = 5

; Adaptive chunking limits (only when translation_chunk_size = 0)
translation_adaptive_max_lines = 30
translation_adaptive_max_chars = 1000

; Maximum translation retries on error
translation_max_retries = 3

; Backoff time in seconds between retries
translation_retry_backoff = 1.0

; Delay in seconds between translation phases to avoid API rate limits (e.g. 429 Too Many Requests)
translation_api_delay = 1.5

; Order in which table rows are filled during progressive translation. Options: top_to_bottom (default), bottom_to_top
translation_order = bottom_to_top

; Check translated sentence word count compatibility
translation_word_count_check = false

; Tolerance and ratio boundaries for word count check
translation_word_count_abs_tolerance = 5
translation_word_count_min_ratio = 0.25
translation_word_count_max_ratio = 3.5

; Fix sentence splits before translation (moves leading punctuation to previous line)
translation_fix_sentence_splits = false

; Print verbose validation errors in log
translation_verbose_validation_errors = false

; Maximum characters before wrapping single-mode paragraphs
translation_wrap_max_chars = 90

[wordfill]
; Enable the word-fill engine: pre-fills IPA, morphology, morpheme and definition fields
; in lookup results from the accumulated local TSV corpus before rendering.
; Set to true to activate. When false (default), the lookup pipeline is unchanged.
enabled = true

; Comma or newline-separated list of directories to scan for TSV result files.
; Paths are resolved relative to this config file. Use '../' for sibling workspaces.
; Example: 
; scan_roots = 
;     ../20241223170748-kardenwort/results
;     ../some_other_repo/results
scan_roots = ./results

; How deep to search within each scan root.
; 0 = only files directly inside the root (no subdirectory traversal)
; 1 = also scan one subdirectory level deep (covers ZID-prefixed archive folders)
scan_depth = 1

; Which TSV files to include in the scan.
; merged = only files matching *-merged.*.tsv (produced by the merge command)
; all    = any .tsv file in scope (session files + merged files).
;          Within the same ZID prefix, merged files are ranked before session files,
;          so a merge that consolidates a session always wins over that session alone.
scan_scope = all

; Sort order for candidate files when scan_scope = all.
; chronological = (default) Absolute timeline priority. Newest files are searched first,
;                 meaning recent session edits override older merged files.
; merged_first  = Merged-Absolute priority. ALL merged files are searched before ANY
;                 session files, regardless of their timestamps.
scan_sort_order = merged_first

; Whether to restrict the corpus scan to files whose language suffix matches
; the language of the current lookup window (e.g. only *.en.tsv for an English lookup).
; true  = (default) only scan files whose suffix matches the current language.
;         Recommended — prevents false matches from cross-language homographs.
; false = language-agnostic: scan all .tsv files regardless of language suffix.
scan_match_language = true

; Maximum number of TSV files to scan per lookup (safety cap).
; Files are sorted newest-ZID-first; only the first scan_max_files are opened.
; A warning is logged to stderr when the cap is applied.
scan_max_files = 100

; Minimum data quality required for a wordfill match to be accepted as a target hit.
; any     = accept any matching row regardless of quality (default)
; partial = require at least one of IPA or morphology to be filled
; full    = require both IPA and morphology to be filled
target_quality = full

; Search behavior when a match meeting target_quality is NOT found across the corpus.
; true  = (default) fallback and return the best sub-target match found.
; false = strictly return empty if target_quality is not met.
target_fallback = true

[classification]
; If false, kardenwort-window will not render classification columns, 
; and will instruct the core to disable classification loading.
enabled = true
; Note: Classifications are configured in the core repository's config.ini
; using language-specific keys (e.g. dictionaries_en, dictionaries_de).

[project_structure]
; The directory where generated TSV results and caching files are stored.
; Relative paths are resolved relative to this config.ini file location.
generated_results_dir = ./results

[audio]
; Enable audio playback on LMB click on a word/row (when highlighted/selected)
lmb_play = true
; What to play on LMB: 'lemma' (WordSource) or 'inflection' (WordSourceInflectedForm)
lmb_source = lemma
; Enable audio playback on RMB click (translation / reverse side of the word)
rmb_play = false

[sentences_mode]
; Enable the sentences analysis mode. When enabled, a paragraph of multiple
; sentences is translated entirely (to preserve context) and then split into
; individual sentence windows.
enabled = true

; If true, allows multi-line mode to further decompose each line into sentences
; using the single-mode decomposition logic.
multi_mode_sentence_decomposition = true

; Override the global anki_sentence_terminators specifically for sentences analysis mode.
; Defines the symbols used to determine the end of a sentence.
terminators = .!?

; Method used to align translated sentences back to source sentences.
; Options:
;   - auto (default): Translates the entire paragraph. If sentence counts match,
;                     uses direct alignment. If they mismatch, falls back to
;                     newline_join block translation. If that also mismatches,
;                     falls back to proportional length-based splitting.
;   - newline_join: Forces sentence-by-sentence alignment by translating
;                   sentences separated by newlines in a single API call.
;   - proportion: Translates as a whole paragraph, then splits the translation
;                 by length proportion.
alignment_method = auto

; Minimum number of sentences required in the input text to trigger 
; sentences analysis mode. Default is 2.
min_sentences = 2

; Deduplication scope passed to kardenwort.py core.
; Options: sentence, global, none. Default is sentence.
deduplication_scope = sentence

; Order in which sentences are spawned.
; Options:
;   - normal (default): Spawns 1, 2, 3... (so the last sentence is on top).
;   - reverse: Spawns ...3, 2, 1 (so the first sentence is on top).
spawn_order = reverse

; Mode for the master/first window.
; Options:
;   - full (default): Keeps the parent window open with the full paragraph view.
;   - stub: Closes the parent window automatically, deleting master session files from disk.
parent_mode = full

[theme_light]
; Overrides for the light theme UI colors
; highlight_orange_active_bg = rgba(255, 225, 105, 0.4)
; highlight_orange_active_text = #b07e00
; highlight_orange_active_hover_bg = rgba(255, 225, 105, 0.6)

[theme_dark]
; Overrides for the dark theme UI colors
; highlight_orange_active_bg = rgba(255, 204, 0, 0.25)
; highlight_orange_active_text = #ffcc00
; highlight_orange_active_hover_bg = rgba(255, 204, 0, 0.4)

